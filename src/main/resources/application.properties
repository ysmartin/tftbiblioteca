spring.application.name=tftbiblioteca

# Configuración de puertos y URLs
# Puerto del Tomcat empotrado, para probar la API sin colisionar con otros proyectos
server.port=8070
# Prefijo de la API automática de Spring Data REST (distinta de la API manual)
spring.data.rest.basePath=/api

# Base de datos H2
spring.datasource.driverClassName=org.h2.Driver
# Base de datos en memoria (se reinicia en cada arranque)
spring.datasource.url=jdbc:h2:mem:tftbiblioteca
# Alternativa comentada: persistencia en disco para conservar datos
# spring.datasource.url=jdbc:h2:file:./data/tftbiblioteca 
# Consola H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Usuario por defecto y sin contraseña
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
# Crea el esquema desde las entidades en cada arranque (sin migraciones)
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true

# OpenAPI / Swagger UI
# Oculta el ejemplo Petstore y apunta al contrato generado de la app
springdoc.swagger-ui.disable-swagger-default-url=true
